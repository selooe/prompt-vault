name: Supabase Keep-Alive Ping

on:
  schedule:
    # Runs every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows you to manually click a "Run" button in GitHub

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Send API Request to Supabase
        run: |
          curl -s -o /dev/null -w "Response: %{http_code}\n" \
          -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
          ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/prompts?limit=1